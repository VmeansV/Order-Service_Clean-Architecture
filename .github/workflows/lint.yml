name: Lint

on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff check
        # Эта команда упадет, если в коде есть ошибки или грязные импорты
        run: ruff check .